# DocTDD Environment Configuration
# Generated by /doctdd-init
# This file describes the project state. The /doctdd command uses it to determine
# which workflow phases to execute. Phase logic is automatic — you only describe
# your project here, not the workflow.

project:
  name: my-project           # Project name
  has_docs: true              # Whether docs/ directory exists
  has_claude_md: true         # Whether CLAUDE.md exists
  monorepo: false             # Whether this is a monorepo (npm workspaces, etc.)
  # packages_dir: packages    # Only needed if monorepo: true

stacks:
  frontend:
    enabled: true             # Set to false for backend-only projects
    agent_skill: vue3-element-plus   # Tech skill loaded into frontend agent
    review_skill: frontend-expert    # Feasibility review skill (Phase 2.5)
    # Other agent_skill options: react-shadcn, angular-material, svelte, etc.
  backend:
    enabled: true
    agent_skill: fastify-prisma      # Tech skill loaded into backend agent
    review_skill: backend-expert     # Feasibility review skill (Phase 2.5)
    # Other agent_skill options: express-prisma, nestjs-typeorm, hono, etc.
  e2e:
    enabled: true
    agent_skill: playwright          # Tech skill loaded into e2e agent
    review_skill: e2e-expert         # Feasibility review skill (Phase 2.5)
    # Other agent_skill options: cypress, etc.

commands:
  test_e2e: "npm run test:e2e"       # Command to run E2E tests
  # test_unit: ""                    # Optional: unit test command
