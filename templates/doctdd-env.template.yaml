# DocTDD Environment Configuration
# Generated by /doctdd-init
# This file describes the project state. The /doctdd command uses it to
# determine which workflow phases to execute.

project:
  name: my-project
  has_docs: true
  has_claude_md: true
  monorepo: false
  # packages_dir: packages    # Only needed if monorepo: true

stacks:
  frontend:
    enabled: true
    agent_skill: vue3-element-plus   # Tech skill injected into frontend agent
    # Other options: react, angular, svelte, electron-game
  backend:
    enabled: true
    agent_skill: fastify-prisma      # Tech skill injected into backend agent
    # Other options: express-prisma, nestjs, hono, electron-game, dotnet-webapi
  testing:
    enabled: true
    agent_skill: playwright          # Tech skill injected into testing agent
    # Other options: cypress, jest, vitest, nunit, xunit

commands:
  test: "npm run test:e2e"
