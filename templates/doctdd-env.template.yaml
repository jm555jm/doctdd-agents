# DocTDD Environment Configuration
# Generated by /doctdd-init
# This file describes the project state. The /doctdd command uses it to
# determine which workflow phases to execute.

project:
  name: my-project
  has_docs: true
  has_claude_md: true
  monorepo: false
  # packages_dir: packages    # Only needed if monorepo: true

stacks:
  frontend:
    enabled: true
    agent_skill: vue3-element-plus   # Tech skill injected into frontend agent
    # Other options: react, angular, svelte, electron-game (create custom skill)
  backend:
    enabled: true
    agent_skill: fastify-prisma      # Tech skill injected into backend agent
    # Other options: express-prisma, nestjs, hono, electron-game (create custom skill)
  e2e:
    enabled: true
    agent_skill: playwright          # Tech skill injected into e2e agent
    # Other options: cypress (create custom skill)

commands:
  test_e2e: "npm run test:e2e"
